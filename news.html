<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Danfer School – News & Announcements</title>

  <!-- Read saved theme immediately -->
  <script>
    (function(){
      var theme = localStorage.getItem('danfer_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Theme -->
  <link rel="stylesheet" href="theme.css">

  <style>
    /* ===== LOCAL STYLES ===== */
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--color-background);
      color: var(--color-text-primary);
      transition: background 0.4s, color 0.4s;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header h1 i {
      -webkit-text-fill-color: transparent;
      margin-right: 6px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 50px;
      border: 1px solid rgba(26, 58, 92, 0.08);
      background: var(--color-card);
      color: var(--color-text-primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', system-ui, sans-serif;
    }
    [data-theme="dark"] .btn {
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .btn:hover {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
      box-shadow: 0 4px 16px rgba(26, 58, 92, 0.2);
      transform: translateY(-2px);
    }
    [data-theme="dark"] .btn:hover {
      background: var(--color-accent);
      color: var(--color-primary);
      border-color: var(--color-accent);
      box-shadow: 0 4px 16px rgba(245, 197, 66, 0.2);
    }

    /* ===== ANNOUNCEMENT CARDS ===== */
    .announcement-card {
      background: var(--color-card);
      border: 1px solid rgba(26, 58, 92, 0.06);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 4px solid var(--color-accent);
    }
    [data-theme="dark"] .announcement-card {
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-left: 4px solid var(--color-accent);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }
    .announcement-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
      border-color: var(--color-accent);
    }
    [data-theme="dark"] .announcement-card:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    .announcement-card h3 {
      color: var(--color-primary);
      margin-bottom: 6px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    [data-theme="dark"] .announcement-card h3 {
      color: var(--color-accent);
    }

    .announcement-card p {
      color: var(--color-text-secondary);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .announcement-card .date {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.8;
      font-weight: 500;
    }
    .announcement-card .date i {
      color: var(--color-accent);
    }

    /* ===== LOADING ===== */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-secondary);
    }
    .loading .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(26, 58, 92, 0.1);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    [data-theme="dark"] .loading .spinner {
      border: 3px solid rgba(255, 255, 255, 0.08);
      border-top-color: var(--color-accent);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-secondary);
    }
    .empty-state i {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 16px;
      color: var(--color-text-secondary);
      opacity: 0.3;
    }
    .empty-state p {
      font-size: 1rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      body { padding: 16px; }
      .header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .header h1 { font-size: 1.6rem; }
      .announcement-card { padding: 18px 16px; }
      .btn { padding: 6px 14px; font-size: 0.8rem; }
    }
    @media (max-width: 400px) {
      .header h1 { font-size: 1.3rem; }
      .announcement-card h3 { font-size: 1rem; }
      .announcement-card p { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header – back button removed -->
    <div class="header">
      <h1><i class="fa-solid fa-newspaper"></i> News & Announcements</h1>
      <div class="header-actions">
        <button id="theme-toggle" class="btn" title="Toggle theme">
          <i class="fa-solid fa-moon"></i> Theme
        </button>
      </div>
    </div>

    <div id="news-container">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading announcements…</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    // ==================== THEME ====================
    const theme = localStorage.getItem('danfer_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
    const themeToggle = document.getElementById('theme-toggle');

    function updateThemeButton() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      themeToggle.innerHTML = isDark
        ? '<i class="fa-solid fa-sun"></i> Theme'
        : '<i class="fa-solid fa-moon"></i> Theme';
    }
    updateThemeButton();

    themeToggle.addEventListener('click', () => {
      const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('danfer_theme', newTheme);
      updateThemeButton();
    });

    // ==================== LOAD ANNOUNCEMENTS ====================
    async function loadAnnouncements() {
      const container = document.getElementById('news-container');
      try {
        const q = query(collection(db, "announcements"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);

        if (snap.empty) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fa-solid fa-inbox"></i>
              <p>No announcements yet. Check back later!</p>
            </div>
          `;
          return;
        }

        container.innerHTML = '';
        snap.forEach(doc => {
          const a = doc.data();
          const date = a.timestamp
            ? new Date(a.timestamp).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
              })
            : 'Unknown date';

          const card = document.createElement('div');
          card.className = 'announcement-card';
          card.innerHTML = `
            <h3>${escapeHTML(a.title)}</h3>
            <p>${escapeHTML(a.content)}</p>
            <div class="date"><i class="fa-solid fa-clock"></i> ${escapeHTML(date)}</div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        console.error('Failed to load announcements:', err);
        container.innerHTML = `
          <div class="loading">
            <p style="color:var(--color-red);">Failed to load announcements. Please try again later.</p>
          </div>
        `;
      }
    }

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    loadAnnouncements();
  </script>
</body>
</html>
