<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Danfer School – Student Results</title>

  <!-- Read saved theme immediately -->
  <script>
    (function(){
      var theme = localStorage.getItem('danfer_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Theme -->
  <link rel="stylesheet" href="theme.css">

  <style>
    /* ===== RESET & BASE ===== */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--color-background);
      color: var(--color-text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      transition: background 0.4s, color 0.4s;
    }

    .container { width: 100%; max-width: 540px; }

    /* ===== CARD ===== */
    .card {
      background: var(--color-card);
      border: 1px solid rgba(26, 58, 92, 0.06);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.04);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: all 0.3s;
    }
    [data-theme="dark"] .card {
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 24px;
      color: var(--color-primary);
      letter-spacing: -0.5px;
    }
    [data-theme="dark"] .logo {
      color: var(--color-text-primary);
    }
    .logo i {
      color: var(--color-accent);
      margin-right: 6px;
    }

    /* ===== FORM ===== */
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-text-secondary);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(26, 58, 92, 0.1);
      background: var(--color-background);
      color: var(--color-text-primary);
      font-size: 0.9rem;
      font-family: 'Inter', system-ui, sans-serif;
      outline: none;
      transition: all 0.3s;
    }
    [data-theme="dark"] input {
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px rgba(26, 58, 92, 0.08);
    }
    [data-theme="dark"] input:focus {
      box-shadow: 0 0 0 4px rgba(245, 197, 66, 0.08);
    }
    input::placeholder {
      color: var(--color-text-secondary);
      opacity: 0.6;
    }

    /* ===== BUTTON ===== */
    .btn-primary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 50px;
      background: var(--color-primary);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(26, 58, 92, 0.2);
    }
    [data-theme="dark"] .btn-primary {
      background: var(--color-accent);
      color: var(--color-primary);
      box-shadow: 0 4px 16px rgba(245, 197, 66, 0.2);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26, 58, 92, 0.3);
    }
    [data-theme="dark"] .btn-primary:hover {
      box-shadow: 0 8px 24px rgba(245, 197, 66, 0.3);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    .btn-primary .spinner-btn {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    [data-theme="dark"] .btn-primary .spinner-btn {
      border: 2px solid rgba(26,58,92,0.2);
      border-top-color: var(--color-primary);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MESSAGES ===== */
    .msg {
      margin-top: 12px;
      font-size: 0.85rem;
      text-align: center;
      min-height: 24px;
      font-weight: 500;
    }
    .msg.error { color: var(--color-red); }
    .msg.success { color: var(--color-green); }

    /* ===== RESULT CARD ===== */
    .result-card {
      margin-top: 20px;
      padding: 20px 24px;
      background: var(--color-card);
      border: 1px solid rgba(26, 58, 92, 0.06);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 4px solid var(--color-accent);
      transition: all 0.3s;
    }
    [data-theme="dark"] .result-card {
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-left: 4px solid var(--color-accent);
    }
    .result-card h3 {
      color: var(--color-primary);
      margin-bottom: 4px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    [data-theme="dark"] .result-card h3 {
      color: var(--color-accent);
    }
    .result-card .subtitle {
      color: var(--color-text-secondary);
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .result-card .subtitle strong {
      color: var(--color-text-primary);
    }

    /* ===== TABLE ===== */
    .result-table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 8px;
    }
    .result-table th,
    .result-table td {
      text-align: left;
      padding: 8px 6px;
      border-bottom: 1px solid rgba(26, 58, 92, 0.06);
      font-size: 0.9rem;
    }
    [data-theme="dark"] .result-table th,
    [data-theme="dark"] .result-table td {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .result-table th {
      color: var(--color-text-secondary);
      text-transform: uppercase;
      font-weight: 600;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
    }
    .result-table td {
      color: var(--color-text-primary);
    }

    /* ===== SUMMARY ===== */
    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 12px;
      border-top: 2px solid rgba(26, 58, 92, 0.06);
      margin-top: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }
    [data-theme="dark"] .summary {
      border-top: 2px solid rgba(255, 255, 255, 0.06);
    }
    .summary strong {
      color: var(--color-text-primary);
    }
    .rank-badge {
      background: var(--color-primary);
      color: #fff;
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(26, 58, 92, 0.2);
    }
    [data-theme="dark"] .rank-badge {
      background: var(--color-accent);
      color: var(--color-primary);
      box-shadow: 0 4px 12px rgba(245, 197, 66, 0.2);
    }
    .rank-badge i {
      font-size: 0.8rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .card { padding: 24px 16px; }
      .logo { font-size: 1.5rem; }
      .result-card { padding: 16px; }
      .summary { font-size: 0.8rem; flex-direction: column; align-items: stretch; gap: 6px; }
      .rank-badge { align-self: flex-start; }
      .result-table th,
      .result-table td { font-size: 0.8rem; padding: 6px 4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo"><i class="fa-solid fa-chart-line"></i> Danfer Results</div>

      <form id="result-form">
        <div class="form-group">
          <label for="student-id">Student ID</label>
          <input type="text" id="student-id" placeholder="e.g. DANFER-2026-0004" required aria-required="true">
        </div>
        <div class="form-group">
          <label for="student-name">Full Name</label>
          <input type="text" id="student-name" placeholder="Your full name" required aria-required="true">
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">
          <i class="fa-solid fa-magnifying-glass"></i> Check Results
        </button>
      </form>

      <div id="result-container"></div>
      <p class="msg" id="error-msg"></p>

      <!-- Back button removed as requested -->
    </div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    const $ = s => document.querySelector(s);

    const form = $('#result-form');
    const studentIdInput = $('#student-id');
    const studentNameInput = $('#student-name');
    const submitBtn = $('#submit-btn');
    const resultContainer = $('#result-container');
    const errorMsg = $('#error-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const studentId = studentIdInput.value.trim();
      const studentName = studentNameInput.value.trim().toLowerCase();

      if (!studentId || !studentName) {
        errorMsg.textContent = 'Please fill in both fields.';
        errorMsg.className = 'msg error';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-btn"></span> Searching…';
      errorMsg.textContent = '';
      resultContainer.innerHTML = '';

      try {
        // 1️⃣ Find the student document by studentId
        const studentQuery = query(collection(db, "students"), where("studentId", "==", studentId));
        const studentSnap = await getDocs(studentQuery);

        if (studentSnap.empty) {
          errorMsg.textContent = 'Student ID not found. Please check and try again.';
          errorMsg.className = 'msg error';
          resetButton();
          return;
        }

        const studentDoc = studentSnap.docs[0];
        const studentData = studentDoc.data();

        // 2️⃣ Verify name (case‑insensitive)
        if (studentData.name.toLowerCase() !== studentName) {
          errorMsg.textContent = 'Name does not match the provided ID. Please try again.';
          errorMsg.className = 'msg error';
          resetButton();
          return;
        }

        const grade = studentData.grade;
        const section = studentData.section;
        if (!grade || !section) {
          errorMsg.textContent = 'Student grade/section missing. Cannot calculate rank.';
          errorMsg.className = 'msg error';
          resetButton();
          return;
        }

        // 3️⃣ Fetch this student's marks
        const myMarksQuery = query(collection(db, "marks"), where("studentId", "==", studentId));
        const myMarksSnap = await getDocs(myMarksQuery);

        if (myMarksSnap.empty) {
          resultContainer.innerHTML = `
            <div class="result-card">
              <h3>${escapeHTML(studentData.name)}</h3>
              <p class="subtitle">ID: <strong>${escapeHTML(studentId)}</strong> &nbsp;|&nbsp; Grade: <strong>${escapeHTML(grade)}${escapeHTML(section)}</strong></p>
              <p style="color:var(--color-text-secondary);">No marks available yet.</p>
            </div>
          `;
          resetButton();
          return;
        }

        // Build my marks table & compute my average
        let myTotal = 0, myCount = 0;
        let myTableRows = '';
        myMarksSnap.forEach(doc => {
          const mark = doc.data();
          myTableRows += `<tr><td>${escapeHTML(mark.subject)}</td><td>${mark.score}</td></tr>`;
          myTotal += mark.score;
          myCount++;
        });
        const myAvg = myTotal / myCount;

        // 4️⃣ Fetch all students in the same grade & section
        const classStudentsQuery = query(collection(db, "students"),
          where("grade", "==", grade),
          where("section", "==", section)
        );
        const classStudentsSnap = await getDocs(classStudentsQuery);
        const studentIds = [];
        const studentNames = {};
        classStudentsSnap.forEach(doc => {
          const s = doc.data();
          const sid = s.studentId || doc.id;
          studentIds.push(sid);
          studentNames[sid] = s.name;
        });

        // 5️⃣ Fetch all marks for these students (batch in chunks of 10)
        const allMarks = [];
        async function fetchMarksForStudents(ids) {
          const marksList = [];
          for (let i = 0; i < ids.length; i += 10) {
            const chunk = ids.slice(i, i + 10);
            const q = query(collection(db, "marks"), where("studentId", "in", chunk));
            const snap = await getDocs(q);
            snap.forEach(doc => marksList.push(doc.data()));
          }
          return marksList;
        }

        const allMarksData = await fetchMarksForStudents(studentIds);

        // Calculate average for each class student
        const averages = {};
        allMarksData.forEach(m => {
          if (!averages[m.studentId]) averages[m.studentId] = { total: 0, count: 0 };
          averages[m.studentId].total += m.score;
          averages[m.studentId].count++;
        });

        const studentAvgs = [];
        for (const sid of studentIds) {
          if (averages[sid] && averages[sid].count > 0) {
            studentAvgs.push({
              studentId: sid,
              name: studentNames[sid] || sid,
              avg: averages[sid].total / averages[sid].count
            });
          }
        }

        // Sort descending by average
        studentAvgs.sort((a, b) => b.avg - a.avg);

        // Assign ranks (handling ties)
        let rank = 1;
        let prevAvg = null;
        let rankDisplay = null;
        for (let i = 0; i < studentAvgs.length; i++) {
          const entry = studentAvgs[i];
          if (prevAvg !== null && entry.avg < prevAvg) {
            rank = i + 1;
          }
          if (entry.studentId === studentId) {
            rankDisplay = rank;
            break;
          }
          prevAvg = entry.avg;
        }

        const totalStudents = studentAvgs.length;
        const rankText = rankDisplay ? `${rankDisplay} / ${totalStudents}` : 'N/A';

        resultContainer.innerHTML = `
          <div class="result-card">
            <h3>${escapeHTML(studentData.name)}</h3>
            <p class="subtitle">ID: <strong>${escapeHTML(studentId)}</strong> &nbsp;|&nbsp; Grade: <strong>${escapeHTML(grade)}${escapeHTML(section)}</strong></p>
            <table class="result-table">
              <thead><tr><th>Subject</th><th>Score</th></tr></thead>
              <tbody>${myTableRows}</tbody>
            </table>
            <div class="summary">
              <span>Total: <strong>${myTotal}</strong></span>
              <span>Average: <strong>${myAvg.toFixed(1)}</strong></span>
              <span class="rank-badge"><i class="fa-solid fa-trophy"></i> Rank: ${rankText}</span>
            </div>
          </div>
        `;

      } catch (err) {
        console.error(err);
        errorMsg.textContent = 'Failed to fetch results. Please try again.';
        errorMsg.className = 'msg error';
      } finally {
        resetButton();
      }
    });

    function resetButton() {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Check Results';
    }

    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
