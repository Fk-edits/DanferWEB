<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Danfer School – Chat</title>

  <!-- Read saved theme immediately -->
  <script>
    (function(){
      var theme = localStorage.getItem('danfer_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Central theme -->
  <link rel="stylesheet" href="theme.css">

  <style>
    /* ===== LOCAL STYLES ===== */
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--color-background);
      color: var(--color-text-primary);
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ===== HEADER ===== */
    .chat-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--color-card);
      border-bottom: 1px solid rgba(26, 58, 92, 0.08);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      color: var(--color-text-primary);
      transition: background 0.3s, border-color 0.3s;
    }
    [data-theme="dark"] .chat-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .chat-header i {
      color: var(--color-accent);
      font-size: 1.2rem;
    }

    /* ===== CHAT AREA ===== */
    .chat-area {
      height: 100vh;
      overflow-y: auto;
      padding-top: 56px;
      padding-bottom: 68px;
      display: flex;
      flex-direction: column;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      position: relative;
    }
    .message.sent { align-self: flex-end; }
    .message.received { align-self: flex-start; }

    .message-bubble {
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .sent .message-bubble {
      background: var(--color-primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    [data-theme="dark"] .sent .message-bubble {
      background: var(--color-accent);
      color: var(--color-primary);
    }

    .received .message-bubble {
      background: var(--color-card);
      border: 1px solid rgba(26, 58, 92, 0.06);
      border-bottom-left-radius: 4px;
      color: var(--color-text-primary);
    }
    [data-theme="dark"] .received .message-bubble {
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .message-sender {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      margin-bottom: 2px;
      padding: 0 4px;
      font-weight: 500;
    }
    .message-time {
      font-size: 0.7rem;
      color: var(--color-text-secondary);
      margin-top: 2px;
      padding: 0 4px;
      align-self: flex-end;
    }

    .delete-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--color-red);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 0.7rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s;
    }
    .delete-btn:hover {
      background: #dc2626;
    }
    .message:hover .delete-btn { display: flex; }

    /* ===== INPUT AREA ===== */
    .chat-input {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 68px;
      background: var(--color-card);
      border-top: 1px solid rgba(26, 58, 92, 0.08);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      transition: background 0.3s, border-color 0.3s;
    }
    [data-theme="dark"] .chat-input {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .chat-input input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 50px;
      border: 1px solid rgba(26, 58, 92, 0.1);
      background: var(--color-background);
      color: var(--color-text-primary);
      font-size: 0.9rem;
      outline: none;
      font-family: 'Inter', system-ui, sans-serif;
      transition: all 0.3s;
    }
    [data-theme="dark"] .chat-input input {
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .chat-input input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px rgba(26, 58, 92, 0.08);
    }
    [data-theme="dark"] .chat-input input:focus {
      box-shadow: 0 0 0 4px rgba(245, 197, 66, 0.08);
    }
    .chat-input input::placeholder {
      color: var(--color-text-secondary);
      opacity: 0.7;
    }
    .chat-input input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .chat-input button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--color-primary);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(26, 58, 92, 0.2);
    }
    [data-theme="dark"] .chat-input button {
      background: var(--color-accent);
      color: var(--color-primary);
      box-shadow: 0 4px 16px rgba(245, 197, 66, 0.2);
    }
    .chat-input button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(26, 58, 92, 0.3);
    }
    [data-theme="dark"] .chat-input button:hover {
      box-shadow: 0 6px 24px rgba(245, 197, 66, 0.3);
    }
    .chat-input button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-text-secondary);
      gap: 12px;
      padding: 20px;
      text-align: center;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(26, 58, 92, 0.15);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    [data-theme="dark"] .spinner {
      border: 3px solid rgba(255, 255, 255, 0.08);
      border-top-color: var(--color-accent);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 500px) {
      .message { max-width: 85%; }
      .chat-header { font-size: 0.95rem; padding: 10px 14px; }
      .chat-input { padding: 8px 12px; gap: 6px; height: 60px; }
      .chat-input input { font-size: 0.85rem; padding: 8px 14px; }
      .chat-input button { width: 38px; height: 38px; }
      .chat-area { padding-bottom: 60px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="chat-header">
    <i class="fa-solid fa-comments"></i>
    <span>Danfer Chat</span>
  </div>

  <!-- Chat area -->
  <main class="chat-area" id="chat-area">
    <div class="chat-messages" id="chat-messages">
      <div class="loading" id="chat-loading">
        <div class="spinner"></div>
        <p>Connecting…</p>
      </div>
    </div>
  </main>

  <!-- Input area -->
  <div class="chat-input">
    <input type="text" id="message-input" placeholder="Type a message…" autocomplete="off" disabled>
    <button id="send-btn" disabled aria-label="Send message"><i class="fa-solid fa-paper-plane"></i></button>
  </div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
    import {
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      serverTimestamp,
      getDocs,
      where,
      doc,
      getDoc,
      deleteDoc
    } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    const messagesContainer = document.getElementById('chat-messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const loadingEl = document.getElementById('chat-loading');

    let currentUser = null;
    let displayName = 'User';
    let isAdmin = false;

    // Listen for auth state
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        loadingEl.innerHTML = '<p>Please log in to use the chat.</p>';
        messageInput.disabled = true;
        sendBtn.disabled = true;
        return;
      }

      currentUser = user;
      displayName = user.email ? user.email.split('@')[0] : 'User';

      // Check if admin
      try {
        const adminDoc = await getDoc(doc(db, "admins", user.uid));
        if (adminDoc.exists() && adminDoc.data().role === 'admin') {
          isAdmin = true;
        }
      } catch (e) {
        isAdmin = false;
      }

      messageInput.disabled = false;
      sendBtn.disabled = false;
      loadingEl.style.display = 'none';

      // Real‑time listener
      const q = query(collection(db, "chat"), orderBy("timestamp", "asc"));
      onSnapshot(q, (snapshot) => {
        messagesContainer.innerHTML = '';
        if (snapshot.empty) {
          messagesContainer.innerHTML = '<div class="loading"><p>No messages yet. Start the conversation!</p></div>';
          return;
        }

        snapshot.forEach(doc => {
          const msg = doc.data();
          const isSentByMe = msg.uid === currentUser.uid;
          const time = msg.timestamp
            ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            : '';

          const msgDiv = document.createElement('div');
          msgDiv.className = `message ${isSentByMe ? 'sent' : 'received'}`;
          msgDiv.innerHTML = `
            ${!isSentByMe ? `<div class="message-sender">${escapeHTML(msg.displayName)}</div>` : ''}
            <div class="message-bubble">${escapeHTML(msg.text)}</div>
            <div class="message-time">${time}</div>
          `;

          // Delete button for admins
          if (isAdmin) {
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
            delBtn.title = 'Delete message';
            delBtn.addEventListener('click', async (e) => {
              e.stopPropagation();
              if (confirm('Delete this message?')) {
                try {
                  await deleteDoc(doc(db, "chat", doc.id));
                } catch (err) {
                  console.error('Failed to delete message:', err);
                }
              }
            });
            msgDiv.appendChild(delBtn);
          }

          messagesContainer.appendChild(msgDiv);
        });

        // Scroll to bottom
        document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
      });
    });

    // Send message
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !currentUser) return;

      try {
        await addDoc(collection(db, "chat"), {
          uid: currentUser.uid,
          displayName: displayName,
          text: text,
          timestamp: serverTimestamp()
        });
        messageInput.value = '';
      } catch (err) {
        console.error('Failed to send message:', err);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
