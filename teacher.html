<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Danfer School – Teacher Dashboard</title>

  <!-- Read saved theme immediately -->
  <script>
    (function(){
      var theme = localStorage.getItem('danfer_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Central theme -->
  <link rel="stylesheet" href="theme.css">
  <!-- Teacher-specific styles -->
  <link rel="stylesheet" href="teacher.css">
</head>
<body>

  <div id="loader"><div class="spinner-ring"></div></div>

  <header class="teacher-header">
    <div class="header-brand"><i class="fa-solid fa-chalkboard-user"></i> <span id="header-teacher-name">Teacher</span></div>
    <div class="header-actions">
      <button id="theme-toggle" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
      <button id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </header>

  <div class="teacher-container">
    <aside class="teacher-sidebar">
      <nav>
        <a data-section="dashboard" class="sidebar-link active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a data-section="marks" class="sidebar-link"><i class="fa-solid fa-edit"></i> Enter Marks</a>
        <a data-section="settings" class="sidebar-link"><i class="fa-solid fa-gear"></i> Settings</a>
      </nav>
    </aside>

    <main class="teacher-main" id="teacher-main">
      <div style="padding:20px;">Loading teacher dashboard…</div>
    </main>
  </div>

  <script type="module" src="teacher.js"></script>
</body>
</html>
