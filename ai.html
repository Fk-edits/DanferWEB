<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenRouter API Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0b1120;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 20px;
      padding: 32px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      border: 1px solid #2d3a4f;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #facc15;
    }
    p.sub {
      color: #94a3b8;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #facc15;
    }
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    .btn {
      background: #facc15;
      color: #0f172a;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-top: 8px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(250, 204, 21, 0.3);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    #result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 300px;
      overflow-y: auto;
    }
    .status-ok { border-left: 4px solid #22c55e; }
    .status-error { border-left: 4px solid #ef4444; }
    .status-pending { border-left: 4px solid #facc15; }
    .hidden { display: none; }
    .model-help {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🔌 OpenRouter Test</h1>
  <p class="sub">Verify your API key, model, and system context are working.</p>

  <div class="form-group">
    <label for="apiKey">API Key</label>
    <input type="text" id="apiKey" placeholder="sk-or-v1-..." value="">
  </div>

  <div class="form-group">
    <label for="model">Model</label>
    <select id="model">
      <option value="openrouter/free">openrouter/free (auto)</option>
      <option value="meta-llama/llama-3.2-3b-instruct:free">Llama 3.2 3B (free)</option>
      <option value="liquid/lfm-2.5-1.2b-instruct:free">LFM 2.5 1.2B (free)</option>
      <option value="qwen/qwen3-coder:free">Qwen3 Coder (free)</option>
      <option value="custom">Custom</option>
    </select>
    <input type="text" id="customModel" placeholder="Enter custom model ID" style="margin-top:6px; display:none;">
    <div class="model-help">Use <code>openrouter/free</code> for automatic selection.</div>
  </div>

  <div class="form-group">
    <label for="context">System Context (optional)</label>
    <textarea id="context" placeholder="You are a helpful assistant..."></textarea>
  </div>

  <div class="form-group">
    <label for="testPrompt">Test Prompt</label>
    <input type="text" id="testPrompt" placeholder="Say hello in one sentence" value="Say hello in one sentence.">
  </div>

  <button class="btn" id="testBtn">▶ Test Connection</button>

  <div id="result" class="hidden status-pending"></div>
</div>

<script>
  (function() {
    const apiKeyInput = document.getElementById('apiKey');
    const modelSelect = document.getElementById('model');
    const customModelInput = document.getElementById('customModel');
    const contextInput = document.getElementById('context');
    const testPromptInput = document.getElementById('testPrompt');
    const testBtn = document.getElementById('testBtn');
    const resultDiv = document.getElementById('result');

    // Toggle custom model input
    modelSelect.addEventListener('change', function() {
      if (this.value === 'custom') {
        customModelInput.style.display = 'block';
      } else {
        customModelInput.style.display = 'none';
      }
    });

    // Load saved values from localStorage (optional)
    const saved = {
      apiKey: localStorage.getItem('test_api_key') || '',
      model: localStorage.getItem('test_model') || 'openrouter/free',
      context: localStorage.getItem('test_context') || '',
      prompt: localStorage.getItem('test_prompt') || 'Say hello in one sentence.'
    };
    apiKeyInput.value = saved.apiKey;
    modelSelect.value = saved.model;
    if (saved.model === 'custom') {
      customModelInput.style.display = 'block';
      customModelInput.value = localStorage.getItem('test_custom_model') || '';
    }
    contextInput.value = saved.context;
    testPromptInput.value = saved.prompt;

    testBtn.addEventListener('click', async function() {
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) {
        showResult('❌ Please enter an API key.', 'error');
        return;
      }

      let model = modelSelect.value;
      if (model === 'custom') {
        model = customModelInput.value.trim();
        if (!model) {
          showResult('❌ Please enter a custom model ID.', 'error');
          return;
        }
      }

      const context = contextInput.value.trim();
      const prompt = testPromptInput.value.trim() || 'Say hello in one sentence.';

      // Save to localStorage
      localStorage.setItem('test_api_key', apiKey);
      localStorage.setItem('test_model', modelSelect.value);
      if (modelSelect.value === 'custom') {
        localStorage.setItem('test_custom_model', customModelInput.value.trim());
      }
      localStorage.setItem('test_context', context);
      localStorage.setItem('test_prompt', prompt);

      testBtn.disabled = true;
      testBtn.textContent = '⏳ Testing...';
      showResult('⏳ Sending request...', 'pending');

      const messages = [];
      if (context) {
        messages.push({ role: 'system', content: context });
      }
      messages.push({ role: 'user', content: prompt });

      try {
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
            'HTTP-Referer': window.location.origin,
            'X-Title': 'OpenRouter Test'
          },
          body: JSON.stringify({
            model: model,
            messages: messages,
            max_tokens: 100
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          let errorMsg = `❌ HTTP ${response.status}`;
          try {
            const errJson = JSON.parse(errorText);
            errorMsg += `: ${errJson.error?.message || errJson.message || errorText}`;
          } catch {
            errorMsg += `: ${errorText}`;
          }
          showResult(errorMsg, 'error');
          return;
        }

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || 'No reply content.';
        showResult(`✅ Success!\n\n📨 Reply:\n${reply}`, 'ok');
      } catch (err) {
        showResult(`❌ Network error: ${err.message}`, 'error');
      } finally {
        testBtn.disabled = false;
        testBtn.textContent = '▶ Test Connection';
      }
    });

    function showResult(text, type) {
      resultDiv.classList.remove('hidden', 'status-ok', 'status-error', 'status-pending');
      resultDiv.textContent = text;
      if (type === 'ok') resultDiv.classList.add('status-ok');
      else if (type === 'error') resultDiv.classList.add('status-error');
      else if (type === 'pending') resultDiv.classList.add('status-pending');
    }
  })();
</script>
</body>
</html>
