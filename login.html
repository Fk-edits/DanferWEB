<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Danfer School – Login</title>

  <!-- Read saved theme immediately -->
  <script>
    (function(){
      var theme = localStorage.getItem('danfer_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Central theme -->
  <link rel="stylesheet" href="theme.css">

  <style>
    /* ===== LOCAL STYLES ===== */
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--color-background);
      color: var(--color-text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      transition: background 0.4s, color 0.4s;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--color-card);
      border: 1px solid rgba(26, 58, 92, 0.08);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: border-color 0.3s, background 0.3s;
    }
    [data-theme="dark"] .login-card {
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
    }

    .logo {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 24px;
      color: var(--color-primary);
      letter-spacing: -0.5px;
    }
    [data-theme="dark"] .logo {
      color: var(--color-text-primary);
    }
    .logo i {
      color: var(--color-accent);
      margin-right: 6px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: rgba(26, 58, 92, 0.06);
      border-radius: 12px;
      padding: 4px;
    }
    [data-theme="dark"] .tabs {
      background: rgba(255, 255, 255, 0.06);
    }

    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      background: transparent;
      border: none;
      color: var(--color-text-secondary);
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .tab.active {
      background: var(--color-primary);
      color: #fff;
      box-shadow: 0 4px 16px rgba(26, 58, 92, 0.25);
    }
    [data-theme="dark"] .tab.active {
      background: var(--color-accent);
      color: var(--color-primary);
      box-shadow: 0 4px 16px rgba(245, 197, 66, 0.2);
    }

    .tab:hover:not(.active) {
      background: rgba(26, 58, 92, 0.06);
    }
    [data-theme="dark"] .tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.04);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      width: 100%;
      padding: 12px 46px 12px 16px;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: var(--color-primary);
    }
    [data-theme="dark"] .password-toggle:hover {
      color: var(--color-accent);
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(26, 58, 92, 0.1);
      background: var(--color-background);
      color: var(--color-text-primary);
      font-size: 0.9rem;
      font-family: 'Inter', system-ui, sans-serif;
      outline: none;
      transition: border 0.3s, box-shadow 0.3s;
    }
    [data-theme="dark"] input {
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px rgba(26, 58, 92, 0.08);
    }
    [data-theme="dark"] input:focus {
      box-shadow: 0 0 0 4px rgba(245, 197, 66, 0.08);
    }

    input::placeholder {
      color: var(--color-text-secondary);
      opacity: 0.7;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 50px;
      background: var(--color-primary);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      box-shadow: 0 4px 16px rgba(26, 58, 92, 0.25);
    }
    [data-theme="dark"] .btn-primary {
      background: var(--color-accent);
      color: var(--color-primary);
      box-shadow: 0 4px 16px rgba(245, 197, 66, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26, 58, 92, 0.3);
    }
    [data-theme="dark"] .btn-primary:hover {
      box-shadow: 0 8px 24px rgba(245, 197, 66, 0.3);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--color-text-secondary);
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(26, 58, 92, 0.1);
    }
    [data-theme="dark"] .divider::before,
    [data-theme="dark"] .divider::after {
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-google {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(26, 58, 92, 0.1);
      border-radius: 50px;
      background: var(--color-card);
      color: var(--color-text-primary);
      font-weight: 500;
      font-size: 0.95rem;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    [data-theme="dark"] .btn-google {
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-google:hover {
      background: rgba(26, 58, 92, 0.04);
      border-color: var(--color-primary);
    }
    [data-theme="dark"] .btn-google:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .btn-google i {
      color: #ea4335;
      font-size: 1.1rem;
    }

    .error {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
      min-height: 24px;
    }

    .footer-link {
      text-align: center;
      margin-top: 20px;
    }
    .footer-link a {
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .footer-link a:hover {
      color: var(--color-primary);
    }
    [data-theme="dark"] .footer-link a:hover {
      color: var(--color-accent);
    }

    .toggle-mode {
      text-align: center;
      margin-top: 14px;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }
    .toggle-mode a {
      color: var(--color-primary);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    [data-theme="dark"] .toggle-mode a {
      color: var(--color-accent);
    }
    .toggle-mode a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none !important;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .login-card {
        padding: 24px 18px;
      }
      .logo {
        font-size: 1.5rem;
      }
      .tabs .tab {
        font-size: 0.75rem;
        padding: 8px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo"><i class="fa-solid fa-graduation-cap"></i> Danfer School</div>

      <div class="tabs">
        <button class="tab active" data-role="admin">Admin</button>
        <button class="tab" data-role="teacher">Teacher</button>
        <button class="tab" data-role="student">Student</button>
      </div>

      <!-- Auth Form -->
      <form id="auth-form" novalidate>
        <div class="form-group">
          <input type="email" id="email" placeholder="Email" required aria-label="Email address">
        </div>
        <div class="form-group">
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Password" required aria-label="Password">
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <!-- Student extra fields (only for sign-up) -->
        <div class="form-group" id="student-name-group" style="display: none;">
          <input type="text" id="student-name" placeholder="Full Name" aria-label="Full name">
        </div>
        <div class="form-group" id="student-subject-group" style="display: none;">
          <input type="text" id="student-subject" placeholder="Favorite Subject" aria-label="Favorite subject">
        </div>
        <div class="form-group" id="student-class-group" style="display: none;">
          <input type="text" id="student-class" placeholder="Class (e.g. Grade 10)" aria-label="Class">
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">
          <i class="fa-solid fa-right-to-bracket"></i> <span id="submit-text">Sign In</span>
        </button>
      </form>

      <p class="toggle-mode" id="student-toggle-mode" style="display: none;">
        <span id="toggle-prompt">Don't have an account?</span>
        <a id="toggle-link">Create Account</a>
      </p>

      <div class="divider">or</div>

      <!-- Google Sign-In -->
      <button id="google-signin-btn" class="btn-google">
        <i class="fa-brands fa-google"></i> Sign in with Google
      </button>

      <p class="error" id="error-message"></p>

      <div class="footer-link">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
      </div>
    </div>
  </div>

  <script type="module">
    // ==================== IMPORTS ====================
    import { auth, db } from './firebase-config.js';
    import {
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      collection,
      query,
      where,
      getDocs,
      addDoc
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // ==================== GOOGLE PROVIDER ====================
    const googleProvider = new GoogleAuthProvider();

    // ==================== PASSWORD SHOW/HIDE ====================
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('password-toggle');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      const icon = toggleBtn.querySelector('i');
      icon.className = isPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
    });

    // ==================== TRANSLATIONS ====================
    const translations = {
      en: {
        sign_in: "Sign In",
        create_account: "Create Account",
        toggle_prompt_signin: "Already have an account?",
        toggle_prompt_signup: "Don't have an account?",
        back_home: "Back to Home"
      },
      am: {
        sign_in: "ግባ",
        create_account: "አካውንት ይፍጠሩ",
        toggle_prompt_signin: "አካውንት አለዎት?",
        toggle_prompt_signup: "ሂሳብ የለዎትም?",
        back_home: "ወደ መነሻ ተመለስ"
      },
      om: {
        sign_in: "Galmaa'i",
        create_account: "Account Uumuu",
        toggle_prompt_signin: "Account duraan qabduu?",
        toggle_prompt_signup: "Account hin qabduu?",
        back_home: "Gara Seensaa deebi'i"
      }
    };

    let currentLang = localStorage.getItem('danfer_lang') || 'en';

    function applyLanguage(lang) {
      const t = translations[lang] || translations.en;
      const submitText = document.getElementById('submit-text');
      const togglePrompt = document.getElementById('toggle-prompt');
      const toggleLink = document.getElementById('toggle-link');
      const isCreating = isCreatingState;

      if (isCreating) {
        if (submitText) submitText.textContent = t.create_account || 'Create Account';
        if (togglePrompt) togglePrompt.textContent = t.toggle_prompt_signin || 'Already have an account?';
        if (toggleLink) toggleLink.textContent = t.sign_in || 'Sign In';
      } else {
        if (submitText) submitText.textContent = t.sign_in || 'Sign In';
        if (togglePrompt) togglePrompt.textContent = t.toggle_prompt_signup || "Don't have an account?";
        if (toggleLink) toggleLink.textContent = t.create_account || 'Create Account';
      }
    }

    // ==================== THEME ====================
    const theme = localStorage.getItem('danfer_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);

    // ==================== STATE ====================
    let currentRole = 'admin';
    let isCreatingState = false;

    // ==================== DOM REFS ====================
    const tabs = document.querySelectorAll('.tab');
    const studentNameGroup = document.getElementById('student-name-group');
    const studentSubjectGroup = document.getElementById('student-subject-group');
    const studentClassGroup = document.getElementById('student-class-group');
    const studentToggleMode = document.getElementById('student-toggle-mode');
    const submitText = document.getElementById('submit-text');
    const toggleLink = document.getElementById('toggle-link');
    const togglePrompt = document.getElementById('toggle-prompt');
    const errorEl = document.getElementById('error-message');
    const emailInput = document.getElementById('email');

    // ==================== SET MODE ====================
    function setMode(creating) {
      isCreatingState = creating;
      const t = translations[currentLang] || translations.en;

      if (creating) {
        submitText.textContent = t.create_account || 'Create Account';
        togglePrompt.textContent = t.toggle_prompt_signin || 'Already have an account?';
        toggleLink.textContent = t.sign_in || 'Sign In';
        studentNameGroup.style.display = 'block';
        studentSubjectGroup.style.display = 'block';
        studentClassGroup.style.display = 'block';
        document.getElementById('student-name').required = true;
        document.getElementById('student-subject').required = true;
        document.getElementById('student-class').required = true;
      } else {
        submitText.textContent = t.sign_in || 'Sign In';
        togglePrompt.textContent = t.toggle_prompt_signup || "Don't have an account?";
        toggleLink.textContent = t.create_account || 'Create Account';
        studentNameGroup.style.display = 'none';
        studentSubjectGroup.style.display = 'none';
        studentClassGroup.style.display = 'none';
        document.getElementById('student-name').required = false;
        document.getElementById('student-subject').required = false;
        document.getElementById('student-class').required = false;
      }
    }

    // ==================== TAB SWITCHING ====================
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentRole = tab.dataset.role;
        errorEl.textContent = '';

        if (currentRole === 'student') {
          studentToggleMode.style.display = 'block';
          setMode(isCreatingState);
        } else {
          studentToggleMode.style.display = 'none';
          isCreatingState = false;
          setMode(false);
        }
      });
    });

    // ==================== TOGGLE LINK ====================
    toggleLink.addEventListener('click', () => {
      isCreatingState = !isCreatingState;
      setMode(isCreatingState);
      errorEl.textContent = '';
    });

    // ==================== VALIDATION HELPERS ====================
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    function isValidPassword(password) {
      return password.length >= 6;
    }

    function sanitizeInput(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.textContent;
    }

    // ==================== FORM SUBMISSION ====================
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';

      const email = sanitizeInput(emailInput.value.trim());
      const password = passwordInput.value.trim();

      // --- Basic Validation ---
      if (!email || !password) {
        errorEl.textContent = 'Please fill all fields.';
        return;
      }

      if (!isValidEmail(email)) {
        errorEl.textContent = '❌ Please enter a valid email address.';
        return;
      }

      if (!isValidPassword(password)) {
        errorEl.textContent = '❌ Password must be at least 6 characters.';
        return;
      }

      try {
        if (currentRole === 'student' && isCreatingState) {
          const studentName = sanitizeInput(document.getElementById('student-name').value.trim());
          const studentSubject = sanitizeInput(document.getElementById('student-subject').value.trim());
          const studentClass = sanitizeInput(document.getElementById('student-class').value.trim());

          if (!studentName || studentName.length < 2) {
            errorEl.textContent = 'Please enter your full name (min 2 characters).';
            return;
          }
          if (studentName.length > 100) {
            errorEl.textContent = 'Name must be less than 100 characters.';
            return;
          }

          // Create the user
          const userCred = await createUserWithEmailAndPassword(auth, email, password);

          // Add student document
          await addDoc(collection(db, "students"), {
            uid: userCred.user.uid,
            email: email,
            name: studentName,
            subject: studentSubject || '',
            class: studentClass || ''
          });

          // Redirect to home
          window.location.href = 'index.html';
        } else {
          // Sign In
          const userCred = await signInWithEmailAndPassword(auth, email, password);
          await handleRoleRedirect(userCred.user.uid);
        }
      } catch (err) {
        console.warn('Auth error:', err.code);
        // User-friendly error messages
        if (err.code === 'auth/email-already-in-use') {
          errorEl.textContent = '❌ This email is already registered. Please sign in instead.';
        } else if (err.code === 'auth/invalid-email') {
          errorEl.textContent = '❌ Invalid email address.';
        } else if (err.code === 'auth/weak-password') {
          errorEl.textContent = '❌ Password must be at least 6 characters.';
        } else if (err.code === 'auth/user-not-found') {
          errorEl.textContent = '❌ No account found with this email. Please sign up first.';
        } else if (err.code === 'auth/wrong-password') {
          errorEl.textContent = '❌ Incorrect password. Please try again.';
        } else if (err.code === 'auth/too-many-requests') {
          errorEl.textContent = '❌ Too many failed attempts. Please wait a few minutes.';
        } else if (err.code === 'auth/network-request-failed') {
          errorEl.textContent = '⚠️ Network error. Please check your internet connection.';
        } else {
          errorEl.textContent = '❌ Authentication failed. Please check your credentials and try again.';
        }
      }
    });

    // ==================== GOOGLE SIGN-IN ====================
    document.getElementById('google-signin-btn').addEventListener('click', async () => {
      errorEl.textContent = '';
      try {
        const result = await signInWithPopup(auth, googleProvider);
        await handleRoleRedirect(result.user.uid);
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          errorEl.textContent = err.message || 'Google sign-in failed.';
        }
      }
    });

    // ==================== ROLE REDIRECT ====================
    async function handleRoleRedirect(uid) {
      errorEl.textContent = '';

      const collections = {
        admin: { name: 'admins', path: 'admin.html' },
        teacher: { name: 'teachers', path: 'teacher.html' },
        student: { name: 'students', path: 'index.html' }
      };

      const role = currentRole;
      const config = collections[role];
      if (!config) {
        errorEl.textContent = 'Invalid role selected.';
        return;
      }

      try {
        const q = query(collection(db, config.name), where("uid", "==", uid));
        const snap = await getDocs(q);
        if (!snap.empty) {
          window.location.href = config.path;
          return;
        }
        await signOut(auth);
        errorEl.textContent = `No ${role} account found with this email. Please sign up first.`;
      } catch (err) {
        console.warn('Redirect error:', err);
        errorEl.textContent = 'An error occurred. Please try again.';
      }
    }

    // ==================== INIT ====================
    applyLanguage(currentLang);

    // Handle Enter key on inputs
    document.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('auth-form').dispatchEvent(new Event('submit'));
        }
      });
    });
  </script>
</body>
</html>
